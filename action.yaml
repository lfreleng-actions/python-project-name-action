---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# python-project-name-action
name: "🐍 Python Project/Package Names"
description: "Extracts Python project name and derives the package name"

inputs:
  # Optional
  path_prefix:
    description: "Directory location containing project code"
    required: false

outputs:
  # Mandatory
  python_project_file:
    # Supports pyproject.toml, setup.cfg and setup.py
    description: "File used to extract/parse project metadata"
    value: ${{ steps.capture.outputs.python_project_file }}
  python_project_name:
    description: >-
      Name of the Python project from pyproject.toml/setup.cfg/setup.py
    value: ${{ steps.capture.outputs.python_project_name }}
  python_package_name:
    # Note: dashes in the name are substituted with underscores
    description: "The name of the Python package"
    value: ${{ steps.capture.outputs.python_package_name }}
  source:
    description: >-
      Source file where project details were found
      (pyproject.toml, setup.cfg or setup.py)
    value: ${{ steps.capture.outputs.source }}

runs:
  using: "composite"
  steps:
    - name: "Setup action/environment"
      id: setup
      shell: bash
      env:
        # Pass the input via the environment rather than interpolating
        # it directly into the script body, so a hostile value cannot
        # break out of shell quoting (zizmor: template-injection).
        INPUT_PATH_PREFIX: ${{ inputs.path_prefix }}
      run: |
        # Setup action/environment

        # Handle path_prefix input consistently and when absent
        path_prefix="$INPUT_PATH_PREFIX"
        if [ -z "$path_prefix" ]; then
          # Set current directory as path prefix
          path_prefix="."
        else
          # Strip any trailing slash in provided path
          path_prefix="${path_prefix%/}"
        fi
        # Verify is a valid directory path
        if [ ! -d "$path_prefix" ]; then
          echo "Error: invalid path/prefix to project directory ❌"; exit 1
        fi
        # Emit via the documented multiline-delimiter form so a value
        # containing newlines cannot append additional output keys
        # (output-injection hardening).
        delimiter="ghadelimiter_${RANDOM}${RANDOM}${RANDOM}"
        {
          printf '%s<<%s\n' "path_prefix" "$delimiter"
          printf '%s\n' "$path_prefix"
          printf '%s\n' "$delimiter"
        } >> "$GITHUB_OUTPUT"

    # Check for pyproject.toml first (preferred)
    # yamllint disable-line rule:line-length
    - uses: lfreleng-actions/path-check-action@9606e61c870025bc956e63156d1d55c5df54426c # v0.2.0
      id: pyproject-toml
      with:
        path: "${{ steps.setup.outputs.path_prefix }}/pyproject.toml"

    - name: "Get project name from pyproject.toml"
      id: pyproject-name
      if: steps.pyproject-toml.outputs.type == 'file'
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/file-grep-regex-action@d35a2dedbdd69fcd6a76bc5898542eb508125970 # v0.1.5
      with:
        flags: "-oP -m1"
        regex: '(?<=^name = ")([^"]*)'
        filename: "${{ steps.setup.outputs.path_prefix }}/pyproject.toml"
        # A pyproject.toml may legitimately carry only a [build-system]
        # table (PEP 517) with no [project] name, e.g. pbr / setuptools
        # projects that keep metadata in setup.cfg. Treat "no name" as a
        # non-fatal empty result so the setup.cfg / setup.py fallbacks can
        # run, rather than aborting the whole action.
        no_fail: "true"

    # Fall back to setup.cfg ([metadata] name) for legacy pbr/setuptools.
    # This runs whenever pyproject.toml did not yield a project name,
    # whether the file is absent or carries only a [build-system] table.
    # yamllint disable-line rule:line-length
    - uses: lfreleng-actions/path-check-action@9606e61c870025bc956e63156d1d55c5df54426c # v0.2.0
      id: setup-cfg
      if: steps.pyproject-name.outputs.extracted_string == ''
      with:
        path: "${{ steps.setup.outputs.path_prefix }}/setup.cfg"

    - name: "Get project name from setup.cfg"
      id: setup-cfg-name
      if: >-
        steps.pyproject-name.outputs.extracted_string == '' &&
        steps.setup-cfg.outputs.type == 'file'
      shell: bash
      env:
        ENV_PATH_PREFIX: ${{ steps.setup.outputs.path_prefix }}
      run: |
        # Extract [metadata] name from setup.cfg
        #
        # Scope the match strictly to the [metadata] section so an
        # unrelated `name =` (e.g. under [options.entry_points]) is
        # not picked up. An empty / missing value is not an error
        # here; the caller will fall through to setup.py.

        # path_prefix is provided by the setup step's output, passed in
        # via this step's env block rather than expanding a template into
        # this run block (zizmor: template-injection).
        cfg="$ENV_PATH_PREFIX/setup.cfg"
        # Match setup.cfg parsing semantics used by configparser
        # (setuptools/pbr): section names and option keys are
        # case-insensitive; either `=` or `:` may delimit the
        # key/value pair; and both `#` and `;` introduce inline
        # comments. Normalize to lowercase before matching.
        name=$(awk '
          /^[[:space:]]*\[/ {
            section=$0
            sub(/^[[:space:]]*\[[[:space:]]*/, "", section)
            sub(/[[:space:]]*\][[:space:]]*$/, "", section)
            section=tolower(section)
            next
          }
          {
            line=$0
          }
          section == "metadata" && \
            tolower(line) ~ /^[[:space:]]*name[[:space:]]*[=:]/ {
            sub(/^[[:space:]]*[^=:]+[=:][[:space:]]*/, "", line)
            sub(/[[:space:]]*([#;].*)?$/, "", line)
            print line
            exit
          }
        ' "$cfg")
        # Defence in depth: only accept names matching a PEP 508-style
        # project-name charset. Anything else (quotes, newlines, shell
        # metacharacters) is treated as no match and falls through to
        # setup.py, so a hostile setup.cfg cannot inject shell syntax
        # into later steps that expand this output.
        if ! printf '%s' "$name" | \
            grep -Eq '^[A-Za-z0-9]([A-Za-z0-9._-]*[A-Za-z0-9])?$'; then
          if [ -n "$name" ]; then
            echo "Rejecting non-PEP-508 name from setup.cfg: $name ⚠️"
          fi
          name=""
        fi
        # Write output via the documented multiline delimiter form so
        # that any unexpected newlines or special characters in the
        # extracted value cannot inject additional step outputs.
        # See:
        # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
        # Use bash-only primitives ($RANDOM and $$) to build a
        # delimiter unlikely to collide with content. Avoids a
        # dependency on `uuidgen`, which may be absent in minimal
        # runner / container images.
        delim="EOF_${RANDOM}_${RANDOM}_$$"
        {
          echo "extracted_string<<$delim"
          printf '%s\n' "$name"
          echo "$delim"
        } >> "$GITHUB_OUTPUT"
        if [ -n "$name" ]; then
          echo "Found name in setup.cfg [metadata]: $name 💬"
        else
          echo "No [metadata] name found in setup.cfg ⚠️"
        fi

    # Fall back to setup.py if neither pyproject.toml nor setup.cfg
    # yielded a usable project name
    # yamllint disable-line rule:line-length
    - uses: lfreleng-actions/path-check-action@9606e61c870025bc956e63156d1d55c5df54426c # v0.2.0
      id: setup-py
      if: >-
        steps.pyproject-name.outputs.extracted_string == '' &&
        (steps.setup-cfg.outputs.type != 'file' ||
         steps.setup-cfg-name.outputs.extracted_string == '')
      with:
        path: "${{ steps.setup.outputs.path_prefix }}/setup.py"

    - name: "Get project name from setup.py"
      id: setup-name
      if: >-
        steps.pyproject-name.outputs.extracted_string == '' &&
        (steps.setup-cfg.outputs.type != 'file' ||
         steps.setup-cfg-name.outputs.extracted_string == '') &&
        steps.setup-py.outputs.type == 'file'
      # yamllint disable-line rule:line-length
      uses: lfreleng-actions/file-grep-regex-action@d35a2dedbdd69fcd6a76bc5898542eb508125970 # v0.1.5
      with:
        flags: "-oP -m1"
        regex: '(?<=name=")([^"]*)'
        filename: "${{ steps.setup.outputs.path_prefix }}/setup.py"

    - name: "Capture Python project metadata"
      id: capture
      shell: bash
      env:
        # Pass step outputs in via the environment rather than
        # interpolating them directly into the script body. This
        # avoids any chance of repo-controlled values (notably the
        # setup.cfg-derived name) breaking out of shell quoting in
        # this step.
        PYPROJECT_NAME: ${{ steps.pyproject-name.outputs.extracted_string }}
        SETUP_CFG_TYPE: ${{ steps.setup-cfg.outputs.type }}
        SETUP_CFG_NAME: ${{ steps.setup-cfg-name.outputs.extracted_string }}
        SETUP_PY_TYPE: ${{ steps.setup-py.outputs.type }}
        SETUP_PY_NAME: ${{ steps.setup-name.outputs.extracted_string }}
      # yamllint disable rule:line-length
      run: |
        # Capture Python project metadata

        # pyproject.toml is the preferred source, but only when it
        # actually yielded a [project] name. A [build-system]-only file
        # leaves PYPROJECT_NAME empty and must fall through to setup.cfg.
        if [ -n "$PYPROJECT_NAME" ]; then
          PYTHON_PROJECT_NAME="$PYPROJECT_NAME"
          PYTHON_PROJECT_FILE="pyproject.toml"
          SOURCE="pyproject.toml"
          echo "Using project name from: pyproject.toml ✅"

        # Fall back to setup.cfg [metadata] (pbr / legacy setuptools)
        elif [ "$SETUP_CFG_TYPE" = 'file' ] && \
             [ -n "$SETUP_CFG_NAME" ]; then
          PYTHON_PROJECT_NAME="$SETUP_CFG_NAME"
          PYTHON_PROJECT_FILE="setup.cfg"
          SOURCE="setup.cfg"
          echo "Using project name from: setup.cfg ⚠️"

        # Fall back to setup.py if neither of the above
        elif [ "$SETUP_PY_TYPE" = 'file' ]; then
          PYTHON_PROJECT_NAME="$SETUP_PY_NAME"
          PYTHON_PROJECT_FILE="setup.py"
          SOURCE="setup.py"
          echo "Using project name from: setup.py ⚠️"
        else
          echo "Error: no project name found in pyproject.toml," \
            "setup.cfg or setup.py ❌"
          exit 1
        fi

        if [ -z "$PYTHON_PROJECT_NAME" ]; then
          echo "Python project name extraction failed ❌"
          exit 1
        fi
        echo "Python project name: $PYTHON_PROJECT_NAME 💬"

        # Replace all dashes in the name with underscores
        PYTHON_PACKAGE_NAME=$(echo "$PYTHON_PROJECT_NAME" | tr '-' '_')
        echo "Python package name: $PYTHON_PACKAGE_NAME"

        # Make available as step outputs (the documented contract)
        echo "python_project_name=$PYTHON_PROJECT_NAME" >> "$GITHUB_OUTPUT"
        echo "python_package_name=$PYTHON_PACKAGE_NAME" >> "$GITHUB_OUTPUT"
        echo "python_project_file=$PYTHON_PROJECT_FILE" >> "$GITHUB_OUTPUT"
        echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
